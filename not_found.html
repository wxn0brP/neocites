<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>wxn0brP</title>
    <meta name="color-scheme" content="dark light">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: #0c0c0c;
            color: #ffffff;

            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            font-size: 1.2rem;
        }

        main {
            padding: 30px 20px;
            border-radius: 10px;
            background-color: #3d0441;
            text-align: center;
        }

        a {
            text-decoration: none;
            width: 5rem;
            color: white;
            border: 1px solid white;
            border-radius: 10px;
            padding: 10px;
        }

        a:hover,
        a:active {
            color: #0c0c0c;
            background-color: white;
        }

        div {
            display: flex;
            gap: 2rem;
            justify-content: center;
        }

        #yes::after {
            content: "NO";
        }

        #yes:hover::after {
            content: "YES";
        }
    </style>
</head>

<body>
    <main>
        <h2>Do you want return to main page???</h2>
        <br>
        <div>
            <a href="/">YES</a>
            <a href="/" id="yes"></a>
        </div>
    </main>
</body>

</html>
