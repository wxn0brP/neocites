<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Whoops. I forgot delete this</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #09090b;
            color: #e4e4e7;
            font-family: "Space Mono", monospace;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        main {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 3rem;
            font-weight: 700;
        }

        footer {
            position: fixed;
            bottom: 0;
            text-align: center;
            width: 100%;
            height: 2rem;
            display: flex;
            justify-content: start;
            align-items: center;
            gap: 8px;
            padding-left: 10px;
            font-size: small;
        }

        #showSeconds {
            display: none;
        }
    </style>
    <link rel="preload" as="image" href="./assets/counter/0.gif">
    <link rel="preload" as="image" href="./assets/counter/1.gif">
    <link rel="preload" as="image" href="./assets/counter/2.gif">
    <link rel="preload" as="image" href="./assets/counter/3.gif">
    <link rel="preload" as="image" href="./assets/counter/4.gif">
    <link rel="preload" as="image" href="./assets/counter/5.gif">
    <link rel="preload" as="image" href="./assets/counter/6.gif">
    <link rel="preload" as="image" href="./assets/counter/7.gif">
    <link rel="preload" as="image" href="./assets/counter/8.gif">
    <link rel="preload" as="image" href="./assets/counter/9.gif">
</head>

<body>
    <main>
        <img>
        <img>
        :
        <img>
        <img>
        <span class="sec">:</span>
        <img class="sec">
        <img class="sec">
    </main>

    <footer>
        <label>
            <input type="checkbox" id="showSeconds" checked>
            <span id="showSecondsSpan">show seconds</span>
        </label>
    </footer>

    <script>
        const showSeconds = document.getElementById("showSeconds");
        const img = document.querySelectorAll("img");
        const sec = document.querySelectorAll(".sec");
        const showSecondsSpan = document.getElementById("showSecondsSpan");

        function update() {
            const time = new Date().toTimeString().replaceAll(":", "");
            for (let i = 0; i < 6; i++)
                img[i].src = `./assets/counter/${time[i]}.gif`;
        }

        function change() {
            sec.forEach(s => s.style.display = showSeconds.checked ? "" : "none");
            showSecondsSpan.style.textDecoration = showSeconds.checked ? "" : "line-through";
        }

        update();
        setInterval(update, 1000);
        showSeconds.addEventListener("change", change);
        change();
    </script>
</body>

</html>
